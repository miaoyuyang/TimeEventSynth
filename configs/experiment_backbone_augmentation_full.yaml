inherits:
  - configs/experiment_low_label.yaml

experiment:
  name: backbone_augmentation_full
  labeled_fraction: 0.2

evaluation:
  seeds: [0]
  labeled_fraction: 0.2
  dataset_balanced: false
  max_timelines_per_dataset: null
  max_points_per_dataset: null
  stratify_by_dataset: true

split:
  group_by_parent_folder: false
  stratify_by_dataset: true

augmentation:
  default_synthesis_method: normalized_time_mean_donor

detector_backbones:
  - name: internal_classifier
    config: {}
  - name: iforest
    config:
      contamination: 0.1
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: ocsvm
    config:
      nu: 0.1
      kernel: rbf
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: lof
    config:
      contamination: 0.1
      n_neighbors: 20
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: autoencoder
    config:
      hidden_layer_sizes: [64, 32, 64]
      max_iter: 200
      window_size: 15
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_points: 50000
  - name: cnn
    config:
      window_size: 32
      stride: 1
      epochs: 10
      batch_size: 128
      learning_rate: 0.001
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_windows: 20000
  - name: timesnet
    config:
      window_size: 48
      stride: 1
      epochs: 10
      batch_size: 128
      learning_rate: 0.001
      d_model: 32
      top_k_periods: 3
      num_blocks: 2
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_windows: 20000

augmentation_policies:
  - name: real_only
  - name: random_event_oversampling
  - name: all_donors_no_filter
  - name: same_dataset_only
  - name: cross_dataset_all
  - name: cross_dataset_compatible
  - name: compatibility_top50
  - name: compatibility_strict

backbones:
  iforest:
    contamination: 0.1
    window_size: 15
  ocsvm:
    nu: 0.1
    kernel: rbf
    window_size: 15
  lof:
    contamination: 0.1
    n_neighbors: 20
    window_size: 15
  autoencoder:
    hidden_layer_sizes: [64, 32, 64]
    max_iter: 200
    window_size: 15
    threshold_mode: synthetic_separation
    train_with_synthetic: false
    max_train_points: 50000
  cnn:
    window_size: 32
    stride: 1
    epochs: 10
    batch_size: 128
    learning_rate: 0.001
    threshold_mode: synthetic_separation
    train_with_synthetic: false
    max_train_windows: 20000
  timesnet:
    window_size: 48
    stride: 1
    epochs: 10
    batch_size: 128
    learning_rate: 0.001
    d_model: 32
    top_k_periods: 3
    num_blocks: 2
    threshold_mode: synthetic_separation
    train_with_synthetic: false
    max_train_windows: 20000

inherits:
  - configs/experiment_backbone_augmentation_balanced_smoke.yaml
  - configs/tsb_uad_public_v2.yaml

experiment:
  name: backbone_augmentation_tsb_real_smoke

dataset:
  name: TSB-UAD-Public-v2
  max_series: 24
  min_length: 500
  max_length: 12000

augmentation:
  default_synthesis_method: learned_prototype_event_time

synthesis:
  top_k: 2
  alignment_grid_size: 32

evaluation:
  seeds: [0]
  dataset_balanced: true
  max_timelines_per_dataset: 3

inherits:
  - configs/experiment_backbone_augmentation_full.yaml
  - configs/tsb_uad_public_v2.yaml

experiment:
  name: backbone_augmentation_tsb_real_100_5seed_groupwise_fpaware

dataset:
  name: TSB-UAD-Public-v2
  max_series: 100
  min_length: 500
  max_length: 20000

augmentation:
  default_synthesis_method: learned_prototype_event_time
  adaptive_groupwise:
    density_backbones: [iforest, lof, ocsvm]
    broad_backbones: [internal_classifier, current_internal_classifier, cnn, timesnet, autoencoder]
    primary_policy_by_family:
      density: groupwise_cross_dataset_compatible
      broad: groupwise_cross_dataset_all
      default: groupwise_cross_dataset_compatible
    fallback_policy_by_family:
      density: groupwise_cross_dataset_all
      broad: groupwise_cross_dataset_compatible
      default: groupwise_cross_dataset_all
    min_synthetic_windows: 1

synthesis:
  top_k: 3
  alignment_grid_size: 32
  grouping:
    num_groups: 4
    grid_size: 32
    context_size: 5

detector_backbones:
  - name: internal_classifier
    config: {}
  - name: iforest
    config:
      contamination: 0.1
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: ocsvm
    config:
      nu: 0.1
      kernel: rbf
      window_size: 15
      stride: 1
      threshold_mode: fp_aware_synthetic_separation
      quantile: 0.99
      false_positive_penalty: 1.0
      max_false_positive_rate: 0.02
      min_calibration_precision: 0.10
      fallback_when_inverted_gap: true
  - name: lof
    config:
      contamination: 0.1
      n_neighbors: 20
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: autoencoder
    config:
      hidden_layer_sizes: [64, 32, 64]
      max_iter: 200
      window_size: 15
      threshold_mode: synthetic_separation
      train_with_synthetic: true
      max_train_points: 50000
  - name: cnn
    config:
      window_size: 32
      stride: 1
      epochs: 10
      batch_size: 128
      learning_rate: 0.001
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_windows: 20000
  - name: timesnet
    config:
      window_size: 48
      stride: 1
      epochs: 10
      batch_size: 128
      learning_rate: 0.001
      d_model: 32
      top_k_periods: 3
      num_blocks: 2
      threshold_mode: fp_aware_synthetic_separation
      quantile: 0.99
      false_positive_penalty: 1.0
      max_false_positive_rate: 0.02
      min_calibration_precision: 0.10
      fallback_when_inverted_gap: true
      train_with_synthetic: false
      max_train_windows: 20000

augmentation_policies:
  - name: real_only
  - name: random_event_oversampling
  - name: groupwise_cross_dataset_all
  - name: groupwise_cross_dataset_compatible
  - name: groupwise_compatibility_strict
  - name: adaptive_groupwise_transfer

evaluation:
  seeds: [0, 1, 2, 3, 4]
  labeled_fraction: 0.2
  dataset_balanced: true
  max_timelines_per_dataset: 10
  max_points_per_dataset: null
  stratify_by_dataset: true
  threshold_tradeoff_grid_size: 80

inherits:
  - configs/experiment_backbone_augmentation_full.yaml

experiment:
  name: backbone_augmentation_balanced_full
  labeled_fraction: 0.2

evaluation:
  seeds: [0, 1, 2, 3, 4]
  labeled_fraction: 0.2
  dataset_balanced: true
  max_timelines_per_dataset: 10
  max_points_per_dataset: null
  stratify_by_dataset: true

split:
  group_by_parent_folder: false
  stratify_by_dataset: true

detector_backbones:
  - name: internal_classifier
    config: {}
  - name: iforest
    config:
      contamination: 0.1
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: ocsvm
    config:
      nu: 0.1
      kernel: rbf
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: lof
    config:
      contamination: 0.1
      n_neighbors: 20
      window_size: 15
      stride: 1
      threshold_mode: synthetic_separation
  - name: autoencoder
    config:
      hidden_layer_sizes: [64, 32, 64]
      max_iter: 200
      window_size: 15
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_points: 50000
  - name: cnn
    config:
      window_size: 32
      stride: 1
      epochs: 10
      batch_size: 128
      learning_rate: 0.001
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_windows: 20000
  - name: timesnet
    config:
      window_size: 48
      stride: 1
      epochs: 10
      batch_size: 128
      learning_rate: 0.001
      d_model: 32
      top_k_periods: 3
      num_blocks: 2
      threshold_mode: synthetic_separation
      train_with_synthetic: false
      max_train_windows: 20000

augmentation_policies:
  - name: real_only
  - name: random_event_oversampling
  - name: cross_dataset_all
  - name: cross_dataset_compatible
  - name: compatibility_strict
